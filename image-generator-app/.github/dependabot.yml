version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "mtdew"
    assignees:
      - "mtdew"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      development-dependencies:
        dependency-type: "development"
        patterns:
          - "@types/*"
          - "eslint*"
          - "prettier*"
          - "typescript"
          - "vite*"
          - "vitest*"
      production-dependencies:
        dependency-type: "production"
        patterns:
          - "react*"
          - "zustand"
          - "lucide-react"